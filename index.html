<!doctype html>
<html lang="da">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Info Scan — v11.2</title>
<style>
  :root{
    --rw-red:#D20014;
    --text:#111827;
    --black:#000;
    --un:#b91c1c;
    --green:#059669;
    --yellow:#CA8A04;
    --red:#B91C1C;
  }
  body{ margin:0; padding:12px; font-family: Arial, ui-monospace, monospace; background:var(--rw-red); color:var(--text); }
  .topbar{ display:flex; justify-content:space-between; align-items:center; gap:12px; margin-bottom:10px; }
  .topTitle{ color:#fff; font-weight:900; font-size:20px; }
  .logo{ height:70px; width:auto; display:block; }
  .card{ background:#fff; border-radius:12px; padding:14px; margin-bottom:14px; }
  /* ── FIX 60 (v11.0): nyt video-wrap layout — qr-scanner har sit eget overlay-system ── */
  #cameraWrap{
    position:relative; width:100%; height:300px; border-radius:10px;
    background:#f3f4f6; display:flex; align-items:center; justify-content:center;
    color:#9ca3af; overflow:hidden;
  }
  #cameraVideo{ width:100%; height:100%; object-fit:cover; display:none; }
  #cameraVideo.active{ display:block; }
  /* ── FIX 61 (v11.0): qr-scanner overlay — biblioteket renderer scan-region selv ── */
  .scan-region-highlight{
    border-radius:10px;
    outline: rgba(0,0,0,0.25) solid 50vmax;
  }
  .scan-region-highlight-svg{
    stroke: rgba(255,255,255,0.85) !important;
    stroke-width: 4 !important;
    stroke-dasharray: none !important;
  }
  .code-outline-highlight{
    stroke: #22c55e !important;
    stroke-width: 5 !important;
    stroke-dasharray: none !important;
  }
  #flashBtn{
    position:absolute; top:8px; right:8px; width:42px; height:42px;
    border-radius:50%; border:0; background:rgba(0,0,0,0.55); color:#fff;
    font-size:20px; cursor:pointer; display:none; z-index:10;
  }
  #flashBtn.visible{ display:block; }
  #flashBtn.on{ background:rgba(255,200,0,0.9); color:#000; }
  #cameraStatus{
    position:absolute; bottom:8px; left:50%; transform:translateX(-50%);
    padding:4px 10px; border-radius:6px; background:rgba(0,0,0,0.7); color:#fff;
    font-size:11px; font-weight:700; display:none; z-index:10; white-space:nowrap;
  }
  #cameraStatus.visible{ display:block; }
  #engineBadge{
    position:absolute; top:8px; left:8px; padding:4px 8px;
    border-radius:6px; background:rgba(0,0,0,0.55); color:#fff;
    font-size:11px; font-weight:700; display:none; z-index:10;
  }
  #engineBadge.visible{ display:block; }
  .btn{ width:100%; height:56px; margin-top:14px; border-radius:10px; border:0; background:#0f172a; color:#fff; font-weight:900; font-size:18px; cursor:pointer; }
  .box{ border:2px solid var(--black); border-radius:6px; padding:10px 12px; margin-bottom:12px; background:white; }
  .catTitle{ font-size:17px; font-weight:900; margin-bottom:8px; }
  .boxValue{ font-family: ui-monospace, monospace; font-size:16px; white-space:pre-wrap; }
  .w-green{ color:var(--green); font-weight:900; }
  .w-yellow{ color:var(--yellow); font-weight:900; }
  .w-red{ color:var(--red); font-weight:900; }
  .kemiRow{ display:flex; justify-content:space-between; align-items:center; }
  .hazard{ width:34px; height:34px; }
  #copyBtn{ width:100%; height:50px; margin-top:12px; border-radius:10px; border:2px solid #ddd; background:white; font-weight:900; font-size:16px; cursor:pointer; }
  @media (max-width:700px){ .logo{ height:56px; } .topTitle{ font-size:18px; } }
</style>
</head>
<body>

<div class="topbar">
  <div class="topTitle">Info Scan — v11.2</div>
  <img class="logo" src="logo.png" alt="ROCKWOOL logo" onerror="this.style.display='none'"/>
</div>

<div class="card">
  <div style="font-weight:700;margin-bottom:8px;">Scanner</div>
  <div id="cameraWrap">
    <span id="placeholder">Kamera er slukket</span>
    <video id="cameraVideo" playsinline></video>
    <div id="engineBadge"></div>
    <button id="flashBtn" title="Lommelygte">💡</button>
    <div id="cameraStatus"></div>
  </div>
  <button id="scanBtn" class="btn">NY SCANNING</button>
</div>

<div class="card" style="position:relative;">
  <div style="font-weight:700;margin-bottom:10px;font-size:18px;">Rådata</div>
  <div id="output"></div>
  <button id="copyBtn" disabled>KOPIER</button>
</div>

<!-- ── FIX 62 (v11.0): brug nimiq/qr-scanner biblioteket ──
     Det her er biblioteket Nimiq Wallet og 5.200+ andre projekter bruger.
     2-3x bedre detection rate end jsQR ifølge officielle benchmarks.
     Bruger BarcodeDetector hvor tilgængelig, falder tilbage til ZXing-port.
     Kører i WebWorker så UI ikke fryser. -->
<script type="module">
  import QrScanner from 'https://cdn.jsdelivr.net/npm/qr-scanner@1.4.2/qr-scanner.min.js';

  /* ──────────────────────────────────────────────────────────────
     UI-elementer
     ────────────────────────────────────────────────────────────── */
  const scanBtn = document.getElementById('scanBtn');
  const output  = document.getElementById('output');
  const copyBtn = document.getElementById('copyBtn');
  const cameraWrap = document.getElementById('cameraWrap');
  const videoEl = document.getElementById('cameraVideo');
  const placeholder = document.getElementById('placeholder');
  const flashBtn = document.getElementById('flashBtn');
  const cameraStatus = document.getElementById('cameraStatus');
  const engineBadge = document.getElementById('engineBadge');

  let qrScanner = null;
  const isAndroid = /Android/i.test(navigator.userAgent);

  function setStatus(msg){
    if(!msg){ cameraStatus.classList.remove('visible'); cameraStatus.textContent=''; return; }
    cameraStatus.textContent = msg;
    cameraStatus.classList.add('visible');
  }

  /* ──────────────────────────────────────────────────────────────
     Eksisterende parser- og render-logik (uændret fra v10.x)
     ────────────────────────────────────────────────────────────── */
  function esc(s){ return String(s||'').replace(/[&<>"']/g, m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[m]); }
  function classifyWeight(kg){
    if(kg <= 15) return {cls:'w-green', extra:''};
    if(kg <= 30) return {cls:'w-yellow', extra:' (Pas på når du løfter)'};
    return {cls:'w-red', extra:' (Brug hjælpe værktøj til løft)'};
  }
  function enableCopy(enable){ copyBtn.disabled = !enable; }
  function clearOutput(){ output.innerHTML = ''; enableCopy(false); }

  /* ──────────────────────────────────────────────────────────────
     FIX 74 (v11.2): Understøttelse af kompakt QR-format
     QR-koder kan nu være enten i det gamle lange format (fx "Område: Produktion")
     eller i det nye korte format (fx "O:Produktion"). Vi mapper kompakte
     nøgler til de lange navne så resten af UI'et fungerer uændret.
     ────────────────────────────────────────────────────────────── */
  const COMPACT_KEY_MAP = {
    'O':  'Område',
    'VN': 'Varenummer',
    'MA': 'Materiale',
    'OP': 'Operatør',
    'A':  'Antal',
    'L':  'Længde',
    'B':  'Bredde',
    'T':  'Tykkelse',
    'V':  'Vægt',
    'M':  'Meter',
    'A2': 'Areal i m²',
    'AI': 'Anden info',
    'LO': 'Lager/Område',
    'RE': 'Reol',
    'HY': 'Hylde',
    'PL': 'Plads',
    'KE': 'Kemi'
  };

  /* ── FIX 75 (v11.2): enheder der automatisk tilføjes når kompakt format mangler dem ── */
  const UNIT_FOR_KEY = {
    'Længde':    'mm',
    'Bredde':    'mm',
    'Tykkelse':  'mm',
    'Vægt':      'kg',
    'Meter':     'm',
    'Areal i m²':'m²'
  };

  /* ── FIX 76 (v11.2): normaliser nøgle og værdi
     - Mapper korte præfikser til lange navne
     - Tilføjer enheder automatisk hvis værdien kun er et tal (kompakt format)
     - Tilføjer "UN"-præfiks automatisk til Kemi hvis værdien starter med tal
     Returnerer { key, value } eller null hvis ukendt nøgle */
  function normalizeKeyValue(rawKey, rawValue){
    const trimmedKey = String(rawKey || '').trim();
    const trimmedVal = String(rawValue || '').trim();
    if(!trimmedKey) return null;

    /* Tjek først om det er en kompakt nøgle (case-sensitive — A vs a betyder noget) */
    let longKey = COMPACT_KEY_MAP[trimmedKey];
    let isCompact = !!longKey;

    /* Hvis ikke kompakt: behold den som langt format
       Bemærk: "Længde i meter" mappes stadig til "Meter" som i den gamle parser */
    if(!longKey){
      longKey = (trimmedKey === 'Længde i meter') ? 'Meter' : trimmedKey;
    }

    let value = trimmedVal;

    /* Hvis kompakt format og værdien er rent numerisk, tilføj enhed */
    if(isCompact && UNIT_FOR_KEY[longKey] && /^[\d.,]+$/.test(value)){
      value = `${value} ${UNIT_FOR_KEY[longKey]}`;
    }

    /* Kemi i kompakt format: "1209" → "UN1209" så hazard-symbol-detektion virker */
    if(isCompact && longKey === 'Kemi' && /^\d+$/.test(value)){
      value = `UN${value}`;
    }

    return { key: longKey, value: value, isCompact: isCompact };
  }

  function parseRaw(raw){
    const lines = String(raw||"").split(/\r?\n/).map(l=>l.trim()).filter(l=>l);
    const data = {};
    let collecting=false;
    let andenArr=[];
    /* ── FIX 77 (v11.2): "kendte" nøgler omfatter nu BÅDE lange og korte præfikser
       Bruges til at afgøre hvornår "Anden info"-blokken slutter ── */
    const knownLong = ['Område','Varenummer','Materiale','Operatør','Antal','Længde','Bredde','Tykkelse','Vægt',
                       'Længde i meter','Meter','Areal i m²','Anden info','Lagerplads','Lager/Område','Reol','Hylde','Plads','Kemi'];
    const knownCompact = Object.keys(COMPACT_KEY_MAP);
    const known = [...knownLong, ...knownCompact];

    for(let i=0;i<lines.length;i++){
      const line = lines[i];

      /* "Anden info"-detektion virker for både "Anden info:" og "AI:" */
      if(/^(Anden info|AI)\s*:/i.test(line)){
        collecting = true;
        const parts = line.split(':');
        if(parts.length>1) andenArr.push(parts.slice(1).join(':').trim());
        continue;
      }
      if(collecting){
        if(/^[A-Za-zÆØÅæøå0-9].*?:/.test(line)){
          const maybeKey = line.split(':')[0].trim();
          if(known.includes(maybeKey)){ collecting = false; i--; continue; }
        }
        andenArr.push(line);
        continue;
      }
      if(line.includes(':')){
        const parts = line.split(':');
        const rawKey = parts[0].trim();
        const rawValue = parts.slice(1).join(':').trim();
        const norm = normalizeKeyValue(rawKey, rawValue);
        if(norm){
          data[norm.key] = norm.value;
        }
      } else {
        const lastKey = Object.keys(data).slice(-1)[0];
        if(lastKey){ data[lastKey] = (data[lastKey] + '\n' + line).trim(); }
        else { data['_extra'] = (data['_extra'] ? data['_extra'] + '\n' : '') + line; }
      }
    }
    if(andenArr.length) data['Anden info'] = andenArr.join('\n');
    return data;
  }

  function makeBox(title, valueHtml){
    const d = document.createElement('div');
    d.className = 'box';
    d.innerHTML = `<div class="catTitle">${esc(title)}</div><div class="boxValue">${valueHtml}</div>`;
    return d;
  }
  function makeKemiBox(title, valueHtml, showHazard){
    const d = document.createElement('div');
    d.className = 'box';
    d.innerHTML = `<div class="catTitle">${esc(title)}</div>
      <div class="kemiRow">
        <div class="boxValue">${valueHtml}</div>
        ${showHazard? `<svg class="hazard" viewBox="0 0 400 400">
          <polygon points="200,20 380,200 200,380 20,200" fill="white" stroke="#d32f2f" stroke-width="35"/>
          <circle cx="200" cy="270" r="35" fill="black"/>
          <rect x="182" y="90" width="36" height="140" rx="18" fill="black"/>
        </svg>` : ''}
      </div>`;
    return d;
  }

  function renderData(data){
    clearOutput();
    const boxes = [
      {title:'Område', keys:['Område']},
      {title:'Varenummer', keys:['Varenummer']},
      /* ── FIX 78 (v11.2): ny "Materiale"-boks fra kompakt format MA: ── */
      {title:'Materiale', keys:['Materiale']},
      {title:'Operatør', keys:['Operatør']},
      {title:'Antal', keys:['Antal']},
      {title:'Mål', keys:['Længde','Bredde','Tykkelse']},
      {title:'Vægt', keys:['Vægt']},
      {title:'Meter', keys:['Meter']},
      {title:'Areal i m²', keys:['Areal i m²']},
      {title:'Anden info', keys:['Anden info']},
      {title:'Lagerplads', keys:['Lagerplads','Lager/Område','Reol','Hylde','Plads']},
      {title:'Kemi', keys:['Kemi']}
    ];

    let unFound = false;
    Object.values(data).forEach(v => { if(/\bUN\d+/.test(v)) unFound = true; });

    boxes.forEach(box => {
      const present = box.keys.filter(k => (k in data) && String(data[k]).trim() !== '');
      if(!present.length) return;

      if(box.title === 'Mål'){
        const arr = [];
        ['Længde','Bredde','Tykkelse'].forEach(k => {
          if(k in data){
            let val = esc(data[k]);
            if(k === 'Tykkelse') val = val.replace(/mm/g, 'my');
            arr.push(`${k}: ${val}`);
          }
        });
        output.appendChild(makeBox(box.title, arr.join('\n')));
        return;
      }

      if(box.title === 'Vægt'){
        const raw = data['Vægt'] ? String(data['Vægt']).trim() : '';
        const m = raw.match(/([\d\.,]+)/);
        let kg = null;
        if(m) kg = parseFloat(m[1].replace(',','.'));
        let cls = '', txt = esc(raw);
        if(kg !== null && !isNaN(kg)){
          const inf = classifyWeight(kg);
          cls = inf.cls;
          txt = `${kg} kg${inf.extra}`;
        }
        output.appendChild(makeBox(box.title, `<span class="${cls}">${txt}</span>`));
        return;
      }

      if(box.title === 'Anden info'){
        output.appendChild(makeBox(box.title, esc(data['Anden info'] || '')));
        return;
      }

      if(box.title === 'Lagerplads'){
        const arr = [];
        ['Lagerplads','Lager/Område','Reol','Hylde','Plads'].forEach((k, i) => {
          if(k in data){
            if(i===0) return;
            arr.push(`${k}: ${esc(data[k])}`);
          }
        });
        output.appendChild(makeBox(box.title, arr.join('\n')));
        return;
      }

      if(box.title === 'Kemi'){
        const v = esc(data['Kemi'] || '');
        output.appendChild(makeKemiBox('Kemi', v, unFound || /\bUN\d+/.test(v)));
        return;
      }

      const key = present[0];
      output.appendChild(makeBox(box.title, esc(data[key])));
    });

    enableCopy(true);
  }

  copyBtn.addEventListener('click', async () => {
    try{
      await navigator.clipboard.writeText(output.innerText || '');
      const prev = copyBtn.textContent;
      copyBtn.textContent = 'KOPIERET';
      setTimeout(()=>copyBtn.textContent = prev,700);
    }catch(e){}
  });

  /* ──────────────────────────────────────────────────────────────
     FIX 73 (v11.1): WORKER_PATH er fjernet
     Den nyere qr-scanner (1.4.2) loader workeren automatisk via
     dynamic import. Ved at sætte WORKER_PATH manuelt brød vi
     biblioteket. Console-warning bekræftede det.
     ────────────────────────────────────────────────────────────── */

  /* ──────────────────────────────────────────────────────────────
     FIX 64 (v11.0): flash-knap håndteret af qr-scanner
     Biblioteket har indbygget hasFlash/turnFlashOn/Off — meget mere
     robust end vores manuelle torch-toggle fra tidligere versioner.
     ────────────────────────────────────────────────────────────── */
  flashBtn.addEventListener('click', async () => {
    if(!qrScanner) return;
    try{
      await qrScanner.toggleFlash();
      flashBtn.classList.toggle('on', qrScanner.isFlashOn());
    }catch(e){
      console.warn('Flash toggle failed:', e);
    }
  });

  /* ──────────────────────────────────────────────────────────────
     FIX 65 (v11.0): start scanning med qr-scanner
     ────────────────────────────────────────────────────────────── */
  async function startScanning(){
    clearOutput();
    setStatus('Starter kamera…');
    placeholder.style.display = 'none';
    videoEl.classList.add('active');

    /* Stop hvis der allerede kører en scanner */
    if(qrScanner){
      try{ qrScanner.destroy(); }catch(e){}
      qrScanner = null;
    }

    try{
      qrScanner = new QrScanner(
        videoEl,
        result => {
          /* ── FIX 66 (v11.0): result er et objekt med .data og .cornerPoints ── */
          const data = (result && result.data) ? result.data : String(result || '');
          if(!data) return;

          /* Stop scanning og vis resultat */
          stopScanning();
          renderData(parseRaw(data));
        },
        {
          /* ── FIX 67 (v11.0): vigtige options ──
             - returnDetailedScanResult: bruger ny API med detaljerede resultater
             - highlightScanRegion: viser overlay med scan-firkant
             - highlightCodeOutline: tegner grøn outline omkring fundet QR-kode
             - preferredCamera: bagkamera
             - maxScansPerSecond: 25 (default) — rigeligt til realtime
             - calculateScanRegion: vi bruger default (centeret kvadrat på 2/3 af mindste side) */
          returnDetailedScanResult: true,
          highlightScanRegion: true,
          highlightCodeOutline: true,
          preferredCamera: 'environment',
          maxScansPerSecond: 25,
        }
      );

      /* ── FIX 68 (v11.0): tillad både normale og inverterede QR-koder
         (hvid på sort baggrund) — dækker alle realistiske use cases */
      qrScanner.setInversionMode('both');

      await qrScanner.start();

      /* ── FIX 69 (v11.0): vis decoder-engine i badge'en ── */
      try{
        const hasNative = typeof window.BarcodeDetector !== 'undefined';
        engineBadge.textContent = hasNative ? '⚡ qr-scanner + Native' : 'qr-scanner';
        engineBadge.classList.add('visible');
      }catch(e){}

      /* ── FIX 70 (v11.0): vis flash-knap hvis hardwaren understøtter det ── */
      try{
        const hasFlash = await qrScanner.hasFlash();
        if(hasFlash){
          flashBtn.classList.add('visible');
        } else {
          flashBtn.classList.remove('visible');
        }
      }catch(e){
        flashBtn.classList.remove('visible');
      }

      setStatus(isAndroid
        ? 'Hold telefonen 15-25 cm fra QR-koden'
        : 'Klar til scanning');
      setTimeout(() => setStatus(''), 3000);

    }catch(err){
      console.error('Scanner start failed:', err);
      videoEl.classList.remove('active');
      placeholder.style.display = '';
      setStatus('Kunne ikke starte kamera');

      /* ── FIX 79 (v11.2): demo bruger nu det nye kompakte format så vi tester parseren ── */
      const demo = `O:Produktion
VN:12345678
MA:Stenuld
OP:Chris
A:10 PL pPL
L:1200
B:600
T:50
V:8.5
M:4.2
A2:2.88
AI:Test linje1
Test linje2
LO:Hal 3
RE:R5
HY:H2
PL:P1
KE:1209`;
      renderData(parseRaw(demo));
    }
  }

  function stopScanning(){
    if(qrScanner){
      try{ qrScanner.stop(); qrScanner.destroy(); }catch(e){}
      qrScanner = null;
    }
    videoEl.classList.remove('active');
    placeholder.style.display = '';
    flashBtn.classList.remove('visible','on');
    engineBadge.classList.remove('visible');
    setStatus('');
  }

  scanBtn.addEventListener('click', startScanning);
  window.addEventListener('beforeunload', stopScanning);

  /* ──────────────────────────────────────────────────────────────
     FIX 72 (v11.0): tjek om kamera findes, vis fejlbesked hvis ikke
     ────────────────────────────────────────────────────────────── */
  QrScanner.hasCamera().then(hasCamera => {
    if(!hasCamera){
      placeholder.textContent = 'Intet kamera fundet';
    }
  }).catch(()=>{});
</script>

</body>
</html>
