<!doctype html>
<html lang="da">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Info Scan — v10.8</title>
<style>
  :root{
    --rw-red:#D20014;
    --text:#111827;
    --black:#000;
    --un:#b91c1c;
    --green:#059669;
    --yellow:#CA8A04;
    --red:#B91C1C;
  }
  body{ margin:0; padding:12px; font-family: Arial, ui-monospace, monospace; background:var(--rw-red); color:var(--text); }
  .topbar{ display:flex; justify-content:space-between; align-items:center; gap:12px; margin-bottom:10px; }
  .topTitle{ color:#fff; font-weight:900; font-size:20px; }
  .logo{ height:70px; width:auto; display:block; }
  .card{ background:#fff; border-radius:12px; padding:14px; margin-bottom:14px; }
  #cameraWrap{ height:260px; border-radius:10px; background:#f3f4f6; display:flex; align-items:center; justify-content:center; color:#9ca3af; overflow:hidden; position:relative; }
  #cameraWrap video{ width:100%; height:100%; object-fit:cover; transform:none !important; -webkit-transform:none !important; }
  #cameraWrap img{ width:100%; height:100%; object-fit:contain; background:#000; }
  #scanFrame{
    position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
    width:60%; aspect-ratio:1/1; border:3px solid rgba(255,255,255,0.85);
    border-radius:8px; box-shadow:0 0 0 2000px rgba(0,0,0,0.25);
    pointer-events:none; display:none;
  }
  #scanFrame.active{ display:block; }
  #torchBtn{
    position:absolute; top:8px; right:8px; width:42px; height:42px;
    border-radius:50%; border:0; background:rgba(0,0,0,0.55); color:#fff;
    font-size:20px; cursor:pointer; display:none; z-index:2;
  }
  #torchBtn.visible{ display:block; }
  #torchBtn.on{ background:rgba(255,200,0,0.9); color:#000; }
  .btn{ width:100%; height:56px; margin-top:14px; border-radius:10px; border:0; background:#0f172a; color:#fff; font-weight:900; font-size:18px; cursor:pointer; }
  /* ── FIX 16 (v10.8): sekundær knap-stil til "Live scan"-fallback ── */
  .btn-secondary{ width:100%; height:46px; margin-top:8px; border-radius:10px; border:2px solid #0f172a; background:#fff; color:#0f172a; font-weight:700; font-size:14px; cursor:pointer; }
  .box{ border:2px solid var(--black); border-radius:6px; padding:10px 12px; margin-bottom:12px; background:white; }
  .catTitle{ font-size:17px; font-weight:900; margin-bottom:8px; }
  .boxValue{ font-family: ui-monospace, monospace; font-size:16px; white-space:pre-wrap; }
  .w-green{ color:var(--green); font-weight:900; }
  .w-yellow{ color:var(--yellow); font-weight:900; }
  .w-red{ color:var(--red); font-weight:900; }
  .kemiRow{ display:flex; justify-content:space-between; align-items:center; }
  .hazard{ width:34px; height:34px; }
  #copyBtn{ width:100%; height:50px; margin-top:12px; border-radius:10px; border:2px solid #ddd; background:white; font-weight:900; font-size:16px; cursor:pointer; }
  /* ── FIX 17 (v10.8): status-meddelelse til feedback ── */
  #status{ font-size:13px; color:#6b7280; margin-top:8px; min-height:18px; text-align:center; }
  #status.error{ color:#b91c1c; font-weight:700; }
  @media (max-width:700px){ .logo{ height:56px; } .topTitle{ font-size:18px; } }
</style>
</head>
<body>

<div class="topbar">
  <div class="topTitle">Info Scan — v10.8</div>
  <img class="logo" src="logo.png" alt="ROCKWOOL logo" onerror="this.style.display='none'"/>
</div>

<div class="card">
  <div style="font-weight:700;margin-bottom:8px;">Scanner</div>
  <div id="cameraWrap">
    Kamera er slukket
    <button id="torchBtn" title="Lommelygte">💡</button>
    <div id="scanFrame"></div>
  </div>
  <button id="scanBtn" class="btn">NY SCANNING</button>
  <!-- ── FIX 18 (v10.8): skjult file input til native kamera capture ── -->
  <input type="file" id="cameraFile" accept="image/*" capture="environment" style="display:none"/>
  <!-- ── FIX 19 (v10.8): fallback-knap til live scanning, kun synlig på Android ── -->
  <button id="liveBtn" class="btn-secondary" style="display:none">Brug live scanning i stedet</button>
  <div id="status"></div>
</div>

<div class="card" style="position:relative;">
  <div style="font-weight:700;margin-bottom:10px;font-size:18px;">Rådata</div>
  <div id="output"></div>
  <button id="copyBtn" disabled>KOPIER</button>
</div>

<script>
const scanBtn = document.getElementById('scanBtn');
const liveBtn = document.getElementById('liveBtn');
const cameraFile = document.getElementById('cameraFile');
const output  = document.getElementById('output');
const copyBtn = document.getElementById('copyBtn');
const cameraWrap = document.getElementById('cameraWrap');
const scanFrame = document.getElementById('scanFrame');
const torchBtn = document.getElementById('torchBtn');
const statusEl = document.getElementById('status');

let videoEl = null;
let canvas = null;
let ctx = null;
let stream = null;
let raf = null;
let focusInterval = null;
let currentTrack = null;
let torchOn = false;

const isAndroid = /Android/i.test(navigator.userAgent);

/* ── FIX 20 (v10.8): på Android viser vi "Brug live scanning" som fallback-mulighed ── */
if(isAndroid){
  liveBtn.style.display = 'block';
  scanBtn.textContent = 'TAG BILLEDE AF QR-KODE';
}

function setStatus(msg, isError){
  statusEl.textContent = msg || '';
  statusEl.classList.toggle('error', !!isError);
}

function esc(s){ return String(s||'').replace(/[&<>"']/g, m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[m]); }
function classifyWeight(kg){
  if(kg <= 15) return {cls:'w-green', extra:''};
  if(kg <= 30) return {cls:'w-yellow', extra:' (Pas på når du løfter)'};
  return {cls:'w-red', extra:' (Brug hjælpe værktøj til løft)'};
}
function enableCopy(enable){ copyBtn.disabled = !enable; }
function clearOutput(){ output.innerHTML = ''; enableCopy(false); }

function parseRaw(raw){
  const lines = String(raw||"").split(/\r?\n/).map(l=>l.trim()).filter(l=>l);
  const data = {};
  let collecting=false;
  let andenArr=[];
  const known = ['Område','Varenummer','Operatør','Antal','Længde','Bredde','Tykkelse','Vægt',
                 'Længde i meter','Meter','Areal i m²','Anden info','Lagerplads','Lager/Område','Reol','Hylde','Plads','Kemi'];
  for(let i=0;i<lines.length;i++){
    const line = lines[i];
    if(/^Anden info/i.test(line)){
      collecting = true;
      const parts=line.split(':');
      if(parts.length>1) andenArr.push(parts.slice(1).join(':').trim());
      continue;
    }
    if(collecting){
      if(/^[A-Za-zÆØÅæøå].*?:/.test(line)){
        const maybeKey = line.split(':')[0].trim();
        if(known.includes(maybeKey)){ collecting = false; i--; continue; }
      }
      andenArr.push(line);
      continue;
    }
    if(line.includes(':')){
      const parts=line.split(':');
      const key = parts[0].trim();
      const value = parts.slice(1).join(':').trim();
      if(key === 'Længde i meter'){
        data['Meter'] = value;
      } else {
        data[key] = value;
      }
    } else {
      const lastKey = Object.keys(data).slice(-1)[0];
      if(lastKey){ data[lastKey] = (data[lastKey] + '\n' + line).trim(); }
      else { data['_extra'] = (data['_extra'] ? data['_extra'] + '\n' : '') + line; }
    }
  }
  if(andenArr.length) data['Anden info'] = andenArr.join('\n');
  return data;
}

function makeBox(title, valueHtml){
  const d = document.createElement('div');
  d.className = 'box';
  d.innerHTML = `<div class="catTitle">${esc(title)}</div><div class="boxValue">${valueHtml}</div>`;
  return d;
}
function makeKemiBox(title, valueHtml, showHazard){
  const d = document.createElement('div');
  d.className = 'box';
  d.innerHTML = `<div class="catTitle">${esc(title)}</div>
    <div class="kemiRow">
      <div class="boxValue">${valueHtml}</div>
      ${showHazard? `<svg class="hazard" viewBox="0 0 400 400">
        <polygon points="200,20 380,200 200,380 20,200" fill="white" stroke="#d32f2f" stroke-width="35"/>
        <circle cx="200" cy="270" r="35" fill="black"/>
        <rect x="182" y="90" width="36" height="140" rx="18" fill="black"/>
      </svg>` : ''}
    </div>`;
  return d;
}

function renderData(data){
  clearOutput();
  const boxes = [
    {title:'Område', keys:['Område']},
    {title:'Varenummer', keys:['Varenummer']},
    {title:'Operatør', keys:['Operatør']},
    {title:'Antal', keys:['Antal']},
    {title:'Mål', keys:['Længde','Bredde','Tykkelse']},
    {title:'Vægt', keys:['Vægt']},
    {title:'Meter', keys:['Meter']},
    {title:'Areal i m²', keys:['Areal i m²']},
    {title:'Anden info', keys:['Anden info']},
    {title:'Lagerplads', keys:['Lagerplads','Lager/Område','Reol','Hylde','Plads']},
    {title:'Kemi', keys:['Kemi']}
  ];

  let unFound = false;
  Object.values(data).forEach(v => { if(/\bUN\d+/.test(v)) unFound = true; });

  boxes.forEach(box => {
    const present = box.keys.filter(k => (k in data) && String(data[k]).trim() !== '');
    if(!present.length) return;

    if(box.title === 'Mål'){
      const arr = [];
      ['Længde','Bredde','Tykkelse'].forEach(k => {
        if(k in data){
          let val = esc(data[k]);
          if(k === 'Tykkelse') val = val.replace(/mm/g, 'my');
          arr.push(`${k}: ${val}`);
        }
      });
      output.appendChild(makeBox(box.title, arr.join('\n')));
      return;
    }

    if(box.title === 'Vægt'){
      const raw = data['Vægt'] ? String(data['Vægt']).trim() : '';
      const m = raw.match(/([\d\.,]+)/);
      let kg = null;
      if(m) kg = parseFloat(m[1].replace(',','.'));
      let cls = '', txt = esc(raw);
      if(kg !== null && !isNaN(kg)){
        const inf = classifyWeight(kg);
        cls = inf.cls;
        txt = `${kg} kg${inf.extra}`;
      }
      output.appendChild(makeBox(box.title, `<span class="${cls}">${txt}</span>`));
      return;
    }

    if(box.title === 'Anden info'){
      output.appendChild(makeBox(box.title, esc(data['Anden info'] || '')));
      return;
    }

    if(box.title === 'Lagerplads'){
      const arr = [];
      ['Lagerplads','Lager/Område','Reol','Hylde','Plads'].forEach((k, i) => {
        if(k in data){
          if(i===0) return;
          arr.push(`${k}: ${esc(data[k])}`);
        }
      });
      output.appendChild(makeBox(box.title, arr.join('\n')));
      return;
    }

    if(box.title === 'Kemi'){
      const v = esc(data['Kemi'] || '');
      output.appendChild(makeKemiBox('Kemi', v, unFound || /\bUN\d+/.test(v)));
      return;
    }

    const key = present[0];
    output.appendChild(makeBox(box.title, esc(data[key])));
  });

  enableCopy(true);
}

copyBtn.addEventListener('click', async () => {
  try{
    await navigator.clipboard.writeText(output.innerText || '');
    const prev = copyBtn.textContent;
    copyBtn.textContent = 'KOPIERET';
    setTimeout(()=>copyBtn.textContent = prev,700);
  }catch(e){}
});

function loadJsQR(){
  return new Promise(res=>{
    if(window.jsQR) return res();
    const s = document.createElement('script');
    s.src = 'https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js';
    s.onload = res;
    s.onerror = res;
    document.head.appendChild(s);
  });
}

function attachTapToFocus(track){
  if(!videoEl || !track) return;
  videoEl.addEventListener('click', async () => {
    try{
      const caps = track.getCapabilities ? track.getCapabilities() : {};
      if(caps.focusMode && caps.focusMode.includes('single-shot')){
        await track.applyConstraints({ advanced: [{ focusMode:'single-shot' }] });
        setTimeout(() => {
          if(caps.focusMode && caps.focusMode.includes('continuous')){
            track.applyConstraints({ advanced: [{ focusMode:'continuous' }] }).catch(()=>{});
          }
        }, 800);
      }
    }catch(e){}
  });
}

async function toggleTorch(){
  if(!currentTrack) return;
  try{
    torchOn = !torchOn;
    await currentTrack.applyConstraints({ advanced: [{ torch: torchOn }] });
    torchBtn.classList.toggle('on', torchOn);
  }catch(e){
    torchOn = false;
    torchBtn.classList.remove('on');
  }
}
torchBtn.addEventListener('click', toggleTorch);

/* ──────────────────────────────────────────────────────────────
   FIX 21 (v10.8): NATIVE KAMERA CAPTURE - PRIMÆR METODE PÅ ANDROID
   Bruger <input capture="environment"> → åbner OS'ets kamera-app
   som har fuld autofokus, makro, tap-to-focus, HDR osv.
   Brugeren tager ét billede, og vi analyserer det med jsQR.
   ────────────────────────────────────────────────────────────── */
async function decodeImageFile(file){
  if(!canvas){ canvas = document.createElement('canvas'); ctx = canvas.getContext('2d', { willReadFrequently: true }); }
  return new Promise((resolve, reject) => {
    const url = URL.createObjectURL(file);
    const img = new Image();
    img.onload = () => {
      try{
        /* Vis preview af det tagne billede */
        cameraWrap.innerHTML = '';
        const previewImg = document.createElement('img');
        previewImg.src = url;
        cameraWrap.appendChild(previewImg);

        /* ── FIX 22 (v10.8): tegn på canvas i fuld opløsning og forsøg decode i flere skalaer ── */
        canvas.width = img.naturalWidth;
        canvas.height = img.naturalHeight;
        ctx.drawImage(img, 0, 0);

        let code = null;
        const fullData = ctx.getImageData(0, 0, canvas.width, canvas.height);
        try{ code = jsQR(fullData.data, fullData.width, fullData.height, { inversionAttempts:'attemptBoth' }); }
        catch(e){}

        /* Fallback: nedskalér og prøv igen — hjælper på meget store/skæve billeder */
        if(!code){
          const scaleSizes = [1280, 800];
          for(const targetW of scaleSizes){
            if(canvas.width <= targetW) continue;
            const ratio = targetW / canvas.width;
            const sw = Math.round(canvas.width * ratio);
            const sh = Math.round(canvas.height * ratio);
            const tmp = document.createElement('canvas');
            tmp.width = sw; tmp.height = sh;
            const tctx = tmp.getContext('2d', { willReadFrequently: true });
            tctx.drawImage(canvas, 0, 0, sw, sh);
            const sData = tctx.getImageData(0, 0, sw, sh);
            try{
              code = jsQR(sData.data, sw, sh, { inversionAttempts:'attemptBoth' });
              if(code) break;
            }catch(e){}
          }
        }

        URL.revokeObjectURL(url);
        if(code && code.data) resolve(code.data);
        else reject(new Error('Ingen QR-kode fundet i billedet'));
      }catch(err){
        URL.revokeObjectURL(url);
        reject(err);
      }
    };
    img.onerror = () => { URL.revokeObjectURL(url); reject(new Error('Kunne ikke indlæse billede')); };
    img.src = url;
  });
}

cameraFile.addEventListener('change', async (e) => {
  const file = e.target.files && e.target.files[0];
  e.target.value = ''; /* så samme fil kan vælges igen */
  if(!file) return;
  setStatus('Analyserer billede…');
  await loadJsQR();
  try{
    const data = await decodeImageFile(file);
    setStatus('');
    renderData(parseRaw(data));
  }catch(err){
    setStatus('Ingen QR-kode fundet — prøv igen, hold telefonen lige over koden og tryk på koden i kamera-appen for at fokusere.', true);
  }
});

/* ──────────────────────────────────────────────────────────────
   LIVE SCANNING (uændret fra v10.7) - bruges på iOS som default
   og som fallback på Android via "Brug live scanning"-knappen
   ────────────────────────────────────────────────────────────── */
async function startCamera(){
  clearOutput();
  if(!videoEl){ videoEl = document.createElement('video'); videoEl.setAttribute('playsinline','true'); }
  if(!canvas){ canvas = document.createElement('canvas'); ctx = canvas.getContext('2d', { willReadFrequently: true }); }

  const constraints = {
    video: {
      facingMode: { ideal: "environment" },
      width:  { ideal: isAndroid ? 2560 : 1920 },
      height: { ideal: isAndroid ? 1440 : 1080 }
    },
    audio: false
  };

  try{
    stream = await navigator.mediaDevices.getUserMedia(constraints);
    const track = stream.getVideoTracks()[0];
    currentTrack = track;
    const caps = track.getCapabilities ? track.getCapabilities() : {};
    const adv = [];

    if(caps.focusMode && caps.focusMode.includes('continuous')) adv.push({ focusMode:'continuous' });

    if(caps.zoom){
      const targetZoom = isAndroid
        ? Math.min(2.0, caps.zoom.max || 1)
        : Math.min(1.2, caps.zoom.max || 1);
      adv.push({ zoom: targetZoom });
    }

    if(isAndroid){
      if(caps.focusDistance){
        adv.push({ focusDistance: Math.max(caps.focusDistance.min || 0.1, 0.1) });
      }
      if(caps.exposureMode && caps.exposureMode.includes('continuous')){
        adv.push({ exposureMode: 'continuous' });
      }
      if(caps.whiteBalanceMode && caps.whiteBalanceMode.includes('continuous')){
        adv.push({ whiteBalanceMode: 'continuous' });
      }
    }

    if(adv.length) track.applyConstraints({ advanced: adv }).catch(()=>{});

    if(caps.torch){ torchBtn.classList.add('visible'); }
    else { torchBtn.classList.remove('visible'); }

    if(isAndroid) attachTapToFocus(track);

    focusInterval = setInterval(()=>{
      if(track && adv.length) track.applyConstraints({ advanced: adv }).catch(()=>{});
    }, 1000);

    videoEl.srcObject = stream;
    await videoEl.play();
    cameraWrap.innerHTML = '';
    cameraWrap.appendChild(videoEl);
    cameraWrap.appendChild(torchBtn);
    cameraWrap.appendChild(scanFrame);
    scanFrame.classList.add('active');
    return true;
  }catch(err){
    console.warn('Camera start failed:', err);
    return false;
  }
}

function stopCamera(){
  if(raf) cancelAnimationFrame(raf);
  raf = null;
  if(stream){ stream.getTracks().forEach(t => t.stop()); stream = null; }
  if(videoEl){ try{ videoEl.pause(); }catch(e){} videoEl.srcObject = null; }
  cameraWrap.innerHTML = 'Kamera er slukket';
  cameraWrap.appendChild(torchBtn);
  cameraWrap.appendChild(scanFrame);
  scanFrame.classList.remove('active');
  torchBtn.classList.remove('visible','on');
  torchOn = false;
  currentTrack = null;
  if(focusInterval){ clearInterval(focusInterval); focusInterval=null; }
}

function tryDecode(imageData){
  if(!window.jsQR) return null;
  try{ return jsQR(imageData.data, imageData.width, imageData.height, { inversionAttempts:'attemptBoth' }); }
  catch(e){
    try{ return jsQR(imageData.data, imageData.width, imageData.height); }
    catch(e2){ return null; }
  }
}

async function scanLoop(){
  if(!videoEl || videoEl.readyState !== videoEl.HAVE_ENOUGH_DATA){
    raf = requestAnimationFrame(scanLoop);
    return;
  }

  if(canvas.width !== videoEl.videoWidth){ canvas.width = videoEl.videoWidth; canvas.height = videoEl.videoHeight; }
  ctx.drawImage(videoEl, 0, 0, canvas.width, canvas.height);

  let code = null;
  try{
    const side = Math.min(canvas.width, canvas.height) * 0.6;
    const cx = (canvas.width - side) / 2;
    const cy = (canvas.height - side) / 2;
    const centerImg = ctx.getImageData(cx, cy, side, side);
    code = tryDecode(centerImg);
    if(!code){
      const fullImg = ctx.getImageData(0, 0, canvas.width, canvas.height);
      code = tryDecode(fullImg);
    }
  }catch(e){
    raf = requestAnimationFrame(scanLoop);
    return;
  }

  if(code && code.data){ stopCamera(); renderData(parseRaw(code.data)); return; }
  raf = requestAnimationFrame(scanLoop);
}

/* ── FIX 23 (v10.8): primær knap-handler — Android går til native capture, iOS til live scan ── */
scanBtn.addEventListener('click', async ()=>{
  clearOutput();
  setStatus('');
  stopCamera();

  if(isAndroid){
    /* Native kamera-app — fuld autofokus, makro osv. */
    cameraFile.click();
    return;
  }

  /* iOS / desktop: live scanning som før */
  cameraWrap.innerHTML='Starter kamera…';
  cameraWrap.appendChild(torchBtn);
  cameraWrap.appendChild(scanFrame);
  await loadJsQR();
  const ok = await startCamera();
  if(!ok){
    const demo=`Område: Demo
Varenummer: 12345
Operatør: DemoBruger
Antal: 2 KS
Længde: 1000 mm
Bredde: 600 mm
Tykkelse: 10 mm
Vægt: 18 kg
Længde i meter: 5 M
Areal i m²: 2 m²
Anden info: Test linje1
Test linje2
Lager/Område: sym01
Reol: 01
Hylde: 02
Plads: 03
Kemi: UN1209`;
    renderData(parseRaw(demo));
    return;
  }
  scanLoop();
});

/* ── FIX 24 (v10.8): fallback-knap — tvinger live scanning på Android ── */
liveBtn.addEventListener('click', async () => {
  clearOutput();
  setStatus('');
  stopCamera();
  cameraWrap.innerHTML='Starter kamera…';
  cameraWrap.appendChild(torchBtn);
  cameraWrap.appendChild(scanFrame);
  await loadJsQR();
  const ok = await startCamera();
  if(!ok){
    setStatus('Kunne ikke starte kamera', true);
    return;
  }
  scanLoop();
});

window.addEventListener('beforeunload', stopCamera);
</script>
</body>
</html>
